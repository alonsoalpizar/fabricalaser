<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp | Admin FabricaLaser</title>
  <link rel="stylesheet" href="admin.css">
  <style>
    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-wrap: wrap;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-warm);
    }
    .filter-group { display: flex; flex-direction: column; gap: 0.25rem; }
    .filter-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-secondary); }
    .filter-input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 0.375rem;
      padding: 0.4rem 0.75rem;
      font-size: 0.875rem;
      height: 36px;
    }
    .filter-input:focus { outline: none; border-color: var(--accent); }
    .filter-search { min-width: 220px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 1.5rem;
      padding: 0.65rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .stats-bar strong { color: var(--text); }

    /* ── Sessions table ── */
    .session-table { width: 100%; border-collapse: collapse; }
    .session-table th {
      text-align: left;
      padding: 0.6rem 1rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-secondary);
      background: var(--bg-warm);
      border-bottom: 1px solid var(--border);
    }
    .session-row {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }
    .session-row:last-child { border-bottom: none; }
    .session-row:hover { background: var(--bg-card-hover); }
    .session-row td { padding: 0.75rem 1rem; vertical-align: top; }

    .cell-date { white-space: nowrap; font-size: 0.85rem; color: var(--text); font-weight: 600; min-width: 90px; }
    .cell-date .day-ago { display: block; font-size: 0.7rem; font-weight: 400; color: var(--text-secondary); }

    .cell-contact .contact-name { font-weight: 600; font-size: 0.9rem; }
    .cell-contact .contact-phone { font-size: 0.75rem; color: var(--text-secondary); }
    .cell-contact .contact-email { font-size: 0.7rem; color: var(--accent); }
    .cell-contact .no-user { font-size: 0.7rem; color: var(--text-secondary); font-style: italic; }

    .cell-count {
      text-align: center;
      white-space: nowrap;
    }
    .msg-badge {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.15rem 0.55rem;
      border-radius: 9999px;
    }

    .cell-preview {
      font-size: 0.825rem;
      color: var(--text-secondary);
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Pagination ── */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--bg-warm);
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* ── Chat view ── */
    #chatView { display: none; }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-warm);
    }
    .chat-back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 0.8rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .chat-back-btn:hover { background: var(--bg-card-hover); }
    .chat-title { font-weight: 600; font-size: 0.95rem; }
    .chat-subtitle { font-size: 0.75rem; color: var(--text-secondary); }
    .chat-container {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding: 1.25rem;
      max-height: calc(100vh - 300px);
      overflow-y: auto;
    }
    .bubble-wrap { display: flex; flex-direction: column; }
    .bubble-wrap.user  { align-items: flex-start; }
    .bubble-wrap.model { align-items: flex-end; }
    .bubble-role { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 2px; }
    .bubble {
      max-width: 72%;
      padding: 0.6rem 0.9rem;
      border-radius: 1rem;
      font-size: 0.875rem;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble.user  { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0.25rem 1rem 1rem 1rem; }
    .bubble.model { background: var(--accent); color: white; border-radius: 1rem 0.25rem 1rem 1rem; }
    .bubble-time  { font-size: 0.68rem; opacity: 0.55; margin-top: 2px; color: var(--text-secondary); }
    .bubble-wrap.model .bubble-time { text-align: right; }

    /* ── Purge section ── */
    .purge-card { margin-top: 1.5rem; border: 1px solid #7f1d1d; border-radius: 0.5rem; overflow: hidden; }
    .purge-header { background: #7f1d1d; color: white; padding: 0.75rem 1.25rem; font-size: 0.875rem; font-weight: 600; }
    .purge-body { padding: 1rem 1.25rem; display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; }
    .purge-result { padding: 0 1.25rem 1rem; font-size: 0.875rem; color: var(--text-secondary); }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <header class="content-header">
      <h1 class="content-title">Bitácora WhatsApp</h1>
      <button class="btn btn-secondary" onclick="triggerDigest()" style="font-size:0.8rem;">
        📧 Enviar digest ahora
      </button>
    </header>

    <div class="content-body">

      <!-- ══════════════ LIST VIEW ══════════════ -->
      <div id="listView">
        <div class="card" style="padding:0;overflow:hidden;">

          <!-- Filter bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <span class="filter-label">Buscar</span>
              <input class="filter-input filter-search" type="text" id="fQuery"
                     placeholder="Teléfono o nombre..." onkeydown="if(event.key==='Enter')applyFilter()">
            </div>
            <div class="filter-group">
              <span class="filter-label">Desde</span>
              <input class="filter-input" type="date" id="fFrom">
            </div>
            <div class="filter-group">
              <span class="filter-label">Hasta</span>
              <input class="filter-input" type="date" id="fTo">
            </div>
            <button class="btn btn-primary" style="height:36px;padding:0 1rem;" onclick="applyFilter()">Buscar</button>
            <button class="btn btn-secondary" style="height:36px;padding:0 0.75rem;" onclick="clearFilter()">Limpiar</button>
          </div>

          <!-- Stats -->
          <div class="stats-bar" id="statsBar">
            <span>Cargando...</span>
          </div>

          <!-- Table -->
          <div id="tableContainer">
            <div class="loading"><div class="spinner"></div></div>
          </div>

          <!-- Pagination -->
          <div class="pagination-bar" id="paginationBar" style="display:none;">
            <span id="pageInfo"></span>
            <div id="pageBtns" style="display:flex;gap:0.35rem;"></div>
          </div>
        </div>

        <!-- Purge section -->
        <div class="purge-card">
          <div class="purge-header">⚠️ Depuración de datos</div>
          <div class="purge-body">
            <div class="filter-group">
              <span class="filter-label">Eliminar mensajes con más de</span>
              <div style="display:flex;align-items:center;gap:0.5rem;">
                <input class="filter-input" type="number" id="purgeDays" value="90" min="1" style="width:80px;">
                <span style="font-size:0.875rem;color:var(--text-secondary);">días de antigüedad</span>
              </div>
            </div>
            <button class="btn btn-secondary" style="height:36px;" onclick="checkPurge()">Verificar</button>
            <button class="btn" id="confirmPurgeBtn" style="display:none;height:36px;background:#991b1b;color:white;" onclick="confirmPurge()">
              Confirmar eliminación
            </button>
          </div>
          <div class="purge-result" id="purgeResult"></div>
        </div>
      </div>

      <!-- ══════════════ CHAT VIEW ══════════════ -->
      <div id="chatView">
        <div class="card" style="padding:0;overflow:hidden;">
          <div class="chat-header">
            <button class="chat-back-btn" onclick="backToList()">← Volver</button>
            <div>
              <div class="chat-title" id="chatTitle"></div>
              <div class="chat-subtitle" id="chatSubtitle"></div>
            </div>
            <span style="margin-left:auto;font-size:0.8rem;color:var(--text-secondary);" id="chatMsgCount"></span>
          </div>
          <div class="chat-container" id="chatContainer"></div>
        </div>
      </div>

    </div><!-- content-body -->
  </main>
</div>

<script src="admin.js"></script>
<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const state = {
  page: 1,
  limit: 20,
  total: 0,
  pages: 0,
};

// ══════════════════════════════════════════════
// FILTER & LOAD
// ══════════════════════════════════════════════
function getFilter() {
  return {
    q:    document.getElementById('fQuery').value.trim(),
    from: document.getElementById('fFrom').value,
    to:   document.getElementById('fTo').value,
    page: state.page,
    limit: state.limit,
  };
}

function applyFilter() {
  state.page = 1;
  loadSessions();
}

function clearFilter() {
  document.getElementById('fQuery').value = '';
  document.getElementById('fFrom').value  = '';
  document.getElementById('fTo').value    = '';
  state.page = 1;
  loadSessions();
}

async function loadSessions() {
  document.getElementById('tableContainer').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  document.getElementById('paginationBar').style.display = 'none';

  const f = getFilter();
  const params = new URLSearchParams({
    page: f.page, limit: f.limit,
    ...(f.q    ? { q: f.q }       : {}),
    ...(f.from ? { from: f.from } : {}),
    ...(f.to   ? { to: f.to }     : {}),
  });

  try {
    const res = await apiGet('/admin/whatsapp/sessions?' + params.toString());
    const { sessions, total, page, limit, pages } = res.data;

    state.total = total;
    state.pages = pages;
    state.page  = page;

    // Stats
    document.getElementById('statsBar').innerHTML =
      `<span><strong>${total}</strong> sesión${total !== 1 ? 'es' : ''}</span>` +
      `<span>Página <strong>${page}</strong> de <strong>${Math.max(pages, 1)}</strong></span>` +
      `<span>${limit} por página</span>`;

    renderTable(sessions, total);
    renderPaginationBar(page, pages);
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
    showEmpty('tableContainer', 'Error al cargar sesiones');
  }
}

// ══════════════════════════════════════════════
// TABLE
// ══════════════════════════════════════════════
function renderTable(sessions, total) {
  const container = document.getElementById('tableContainer');
  if (sessions.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
        </svg>
        <p>No hay sesiones con los filtros aplicados</p>
      </div>`;
    return;
  }

  const rows = sessions.map(s => {
    const dateLabel = formatSessionDate(s.session_date);
    const daysAgo   = daysAgoLabel(s.session_date);

    const contactCell = s.user_nombre
      ? `<div class="contact-name">${escHtml(s.user_nombre)}</div>
         <div class="contact-phone">${escHtml(s.phone)}</div>
         ${s.user_email ? `<div class="contact-email">${escHtml(s.user_email)}</div>` : ''}`
      : `<div class="contact-phone" style="font-weight:600;">${escHtml(s.phone)}</div>
         <div class="no-user">Sin registro</div>`;

    const preview = s.first_user_message
      ? escHtml(s.first_user_message.length > 70 ? s.first_user_message.slice(0, 70) + '…' : s.first_user_message)
      : '<em style="opacity:.5">—</em>';

    // Use data-* attributes to avoid quote-escaping issues in onclick
    return `<tr class="session-row"
      data-phone="${escHtml(s.phone)}"
      data-date="${escHtml(s.session_date)}"
      data-nombre="${escHtml(s.user_nombre || '')}"
      data-email="${escHtml(s.user_email || '')}">
      <td class="cell-date">${dateLabel}<span class="day-ago">${daysAgo}</span></td>
      <td class="cell-contact">${contactCell}</td>
      <td class="cell-count"><span class="msg-badge">${s.message_count}</span></td>
      <td class="cell-preview">${preview}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <table class="session-table">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Contacto</th>
          <th style="text-align:center;">Msgs</th>
          <th>Primera consulta</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ══════════════════════════════════════════════
// PAGINATION
// ══════════════════════════════════════════════
function renderPaginationBar(page, pages) {
  if (pages <= 1) return;
  document.getElementById('paginationBar').style.display = 'flex';
  document.getElementById('pageInfo').textContent = `Página ${page} de ${pages}`;

  const btns = [];
  // Prev
  btns.push(`<button class="pagination-btn" ${page===1?'disabled':''} onclick="goPage(${page-1})">‹</button>`);
  // Pages (max 7 visible)
  let start = Math.max(1, page - 3);
  let end   = Math.min(pages, start + 6);
  if (end - start < 6) start = Math.max(1, end - 6);
  if (start > 1) btns.push(`<button class="pagination-btn" onclick="goPage(1)">1</button><span style="padding:0 4px;color:var(--text-secondary)">…</span>`);
  for (let i = start; i <= end; i++) {
    btns.push(`<button class="pagination-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`);
  }
  if (end < pages) btns.push(`<span style="padding:0 4px;color:var(--text-secondary)">…</span><button class="pagination-btn" onclick="goPage(${pages})">${pages}</button>`);
  // Next
  btns.push(`<button class="pagination-btn" ${page===pages?'disabled':''} onclick="goPage(${page+1})">›</button>`);

  document.getElementById('pageBtns').innerHTML = btns.join('');
}

function goPage(n) {
  state.page = n;
  loadSessions();
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════════
// CHAT VIEW
// ══════════════════════════════════════════════
async function openSession(phone, date, userNombre, userEmail) {
  document.getElementById('listView').style.display = 'none';
  document.getElementById('chatView').style.display = 'block';

  // Header
  const title = userNombre
    ? `${userNombre} <span style="font-weight:400;font-size:0.8rem;color:var(--text-secondary);">(${escHtml(phone)})</span>`
    : escHtml(phone);
  document.getElementById('chatTitle').innerHTML = title;
  document.getElementById('chatSubtitle').textContent = formatSessionDate(date) + (userEmail ? ' · ' + userEmail : '');
  document.getElementById('chatMsgCount').textContent = '';
  document.getElementById('chatContainer').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const res = await apiGet(`/admin/whatsapp/sessions/${encodeURIComponent(phone)}/${date}`);
    const messages = res.data || [];

    document.getElementById('chatMsgCount').textContent = `${messages.length} mensaje${messages.length !== 1 ? 's' : ''}`;

    if (messages.length === 0) {
      document.getElementById('chatContainer').innerHTML = '<div class="empty-state"><p>Sin mensajes</p></div>';
      return;
    }

    document.getElementById('chatContainer').innerHTML = messages.map(m => {
      const time = new Date(m.created_at).toLocaleTimeString('es-CR', { hour: '2-digit', minute: '2-digit' });
      const label = m.role === 'model' ? 'Asistente' : 'Cliente';
      return `<div class="bubble-wrap ${m.role}">
        <div class="bubble-role">${label}</div>
        <div class="bubble ${m.role}">${escHtml(m.content)}</div>
        <div class="bubble-time">${time}</div>
      </div>`;
    }).join('');

    document.getElementById('chatContainer').scrollTop = 9999;
  } catch (err) {
    showToast('Error cargando mensajes: ' + err.message, 'error');
  }
}

function backToList() {
  document.getElementById('chatView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
}

// ══════════════════════════════════════════════
// PURGE
// ══════════════════════════════════════════════
let _purgeCount = 0;

async function checkPurge() {
  const days = parseInt(document.getElementById('purgeDays').value) || 0;
  if (days < 1) { showToast('Ingrese un número de días válido', 'warning'); return; }
  try {
    const res = await apiPost('/admin/whatsapp/purge', { older_than_days: days, dry_run: true });
    _purgeCount = res.data.count;
    document.getElementById('purgeResult').innerHTML =
      _purgeCount === 0
        ? `<span style="color:var(--success);">✓ No hay mensajes con más de ${days} días.</span>`
        : `<span style="color:var(--warning);">⚠️ Se eliminarían <strong>${_purgeCount} mensajes</strong> con más de ${days} días de antigüedad.</span>`;
    document.getElementById('confirmPurgeBtn').style.display = _purgeCount > 0 ? 'inline-flex' : 'none';
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

async function confirmPurge() {
  const days = parseInt(document.getElementById('purgeDays').value) || 0;
  const ok = await confirmAction(`¿Eliminar ${_purgeCount} mensajes con más de ${days} días? Esta acción no se puede deshacer.`);
  if (!ok) return;
  try {
    const res = await apiPost('/admin/whatsapp/purge', { older_than_days: days, dry_run: false });
    showToast(`Se eliminaron ${res.data.deleted} mensajes`, 'success');
    document.getElementById('purgeResult').textContent = '';
    document.getElementById('confirmPurgeBtn').style.display = 'none';
    _purgeCount = 0;
    loadSessions();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

// ══════════════════════════════════════════════
// DIGEST
// ══════════════════════════════════════════════
async function triggerDigest() {
  try {
    await apiPost('/admin/whatsapp/digest/send', {});
    showToast('Digest enviado a info@fabricalaser.com', 'success');
  } catch (err) {
    showToast('Error enviando digest: ' + err.message, 'error');
  }
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatSessionDate(dateStr) {
  // dateStr is "YYYY-MM-DD"
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString('es-CR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function daysAgoLabel(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((today - date) / 86400000);
  if (diff === 0) return 'Hoy';
  if (diff === 1) return 'Ayer';
  if (diff < 7)  return `Hace ${diff} días`;
  if (diff < 30) return `Hace ${Math.floor(diff/7)} sem.`;
  return `Hace ${Math.floor(diff/30)} mes${Math.floor(diff/30)>1?'es':''}`;
}

// ══════════════════════════════════════════════
// DELEGATED ROW CLICK (avoids inline onclick with complex values)
// ══════════════════════════════════════════════
document.addEventListener('click', function(e) {
  const row = e.target.closest('.session-row');
  if (row) {
    openSession(row.dataset.phone, row.dataset.date, row.dataset.nombre, row.dataset.email);
  }
});

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
(async () => {
  const ok = await initAdmin('whatsapp');
  if (ok) loadSessions();
})();
</script>
</body>
</html>
