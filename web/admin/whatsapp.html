<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp | Admin FabricaLaser</title>
  <link rel="stylesheet" href="admin.css">
  <style>
    /* ---- Contact list ---- */
    .contact-row {
      display: grid;
      grid-template-columns: 1fr 2fr auto auto;
      gap: 1rem;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-row:hover { background: var(--bg-card-hover); }

    .contact-phone {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }
    .contact-preview {
      color: var(--text-secondary);
      font-size: 0.875rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .contact-date {
      color: var(--text-secondary);
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .contact-count {
      background: var(--accent);
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      min-width: 2rem;
      text-align: center;
    }

    /* ---- Chat view ---- */
    #chatView { display: none; }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .chat-back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.9rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 0.15s;
    }
    .chat-back-btn:hover { background: var(--bg-card-hover); }
    .chat-phone-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    .chat-msg-count {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-left: auto;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding: 1.25rem;
      max-height: calc(100vh - 280px);
      overflow-y: auto;
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
    }
    .bubble-wrap.user  { align-items: flex-start; }
    .bubble-wrap.model { align-items: flex-end; }

    .bubble {
      max-width: 72%;
      padding: 0.65rem 1rem;
      border-radius: 1rem;
      line-height: 1.55;
      font-size: 0.9rem;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble.user {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 0.25rem 1rem 1rem 1rem;
      color: var(--text);
    }
    .bubble.model {
      background: var(--accent);
      color: white;
      border-radius: 1rem 0.25rem 1rem 1rem;
    }

    .bubble-meta {
      font-size: 0.7rem;
      margin-top: 0.2rem;
      opacity: 0.6;
      color: var(--text-secondary);
    }
    .bubble-wrap.model .bubble-meta { text-align: right; }

    .bubble-role-tag {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.15rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <header class="content-header">
      <h1 class="content-title">Bitácora WhatsApp</h1>
    </header>

    <div class="content-body">
      <!-- ===== CONTACTS VIEW ===== -->
      <div id="contactsView">
        <div class="card">
          <div class="card-header">
            <h3>Conversaciones por contacto</h3>
            <span class="text-muted" id="contactCount" style="font-size:0.875rem;color:var(--text-secondary);"></span>
          </div>
          <div class="card-body" style="padding:0;" id="contactsContainer">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- ===== CHAT VIEW ===== -->
      <div id="chatView">
        <div class="card">
          <div class="chat-header">
            <button class="chat-back-btn" onclick="backToContacts()">← Volver</button>
            <span class="chat-phone-label" id="chatPhone"></span>
            <span class="chat-msg-count" id="chatMsgCount"></span>
          </div>
          <div class="chat-container" id="chatContainer"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="admin.js"></script>
<script>
  // ================================================
  // CONTACTS
  // ================================================
  async function loadContacts() {
    showLoading('contactsContainer');
    try {
      const res = await apiGet('/admin/whatsapp/conversations');
      const contacts = res.data || [];
      _contactsCache = contacts;

      const countEl = document.getElementById('contactCount');
      countEl.textContent = contacts.length === 0
        ? 'Sin conversaciones'
        : `${contacts.length} contacto${contacts.length !== 1 ? 's' : ''}`;

      const container = document.getElementById('contactsContainer');
      if (contacts.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
            </svg>
            <p>No hay conversaciones archivadas</p>
          </div>`;
        return;
      }

      container.innerHTML = contacts.map(c => {
        const isKnown = !!c.user_nombre;
        const phoneCell = isKnown
          ? `<div class="contact-phone">
               ${escapeHtml(c.user_nombre)}
               <span style="display:block;font-size:0.75rem;font-weight:400;color:var(--text-secondary);margin-top:2px;">${escapeHtml(c.phone)}</span>
               <span style="display:block;font-size:0.7rem;color:var(--accent);">${escapeHtml(c.user_email || '')}</span>
             </div>`
          : `<div class="contact-phone">
               ${escapeHtml(c.phone)}
               <span style="display:block;font-size:0.7rem;font-weight:400;color:var(--text-secondary);margin-top:2px;">Sin registro</span>
             </div>`;
        return `
          <div class="contact-row" onclick="openConversation('${escapeAttr(c.phone)}')">
            ${phoneCell}
            <div class="contact-preview">
              <span style="opacity:0.5;font-size:0.75rem;margin-right:0.3rem;">${c.last_role === 'model' ? '🤖' : '👤'}</span>
              ${escapeHtml(truncate(c.last_message, 80))}
            </div>
            <div class="contact-date">${formatDate(c.last_message_at)}</div>
            <div class="contact-count">${c.total_messages}</div>
          </div>`;
      }).join('');
    } catch (err) {
      showToast('Error cargando conversaciones: ' + err.message, 'error');
      showEmpty('contactsContainer', 'Error al cargar conversaciones');
    }
  }

  // ================================================
  // CONVERSATION
  // ================================================
  // contacts cache for the user lookup when opening a chat
  let _contactsCache = [];

  async function openConversation(phone) {
    document.getElementById('contactsView').style.display = 'none';
    document.getElementById('chatView').style.display = 'block';

    // Try to find user info from cache
    const contact = _contactsCache.find(c => c.phone === phone);
    const phoneEl = document.getElementById('chatPhone');
    if (contact && contact.user_nombre) {
      phoneEl.innerHTML = `${escapeHtml(contact.user_nombre)} <span style="font-weight:400;font-size:0.85rem;color:var(--text-secondary);">(${escapeHtml(phone)})</span>`;
    } else {
      phoneEl.textContent = phone;
    }
    document.getElementById('chatMsgCount').textContent = '';
    document.getElementById('chatContainer').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    try {
      const res = await apiGet('/admin/whatsapp/conversations/' + encodeURIComponent(phone));
      const messages = res.data || [];

      document.getElementById('chatMsgCount').textContent =
        `${messages.length} mensaje${messages.length !== 1 ? 's' : ''}`;

      const container = document.getElementById('chatContainer');
      if (messages.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>Sin mensajes</p></div>';
        return;
      }

      container.innerHTML = messages.map(m => `
        <div class="bubble-wrap ${m.role}">
          <div class="bubble-role-tag">${m.role === 'model' ? 'Asistente' : 'Usuario'}</div>
          <div class="bubble ${m.role}">${escapeHtml(m.content)}</div>
          <div class="bubble-meta">${formatDate(m.created_at)}</div>
        </div>
      `).join('');

      // Scroll to bottom
      container.scrollTop = container.scrollHeight;
    } catch (err) {
      showToast('Error cargando conversación: ' + err.message, 'error');
      document.getElementById('chatContainer').innerHTML =
        '<div class="empty-state"><p>Error al cargar los mensajes</p></div>';
    }
  }

  function backToContacts() {
    document.getElementById('chatView').style.display = 'none';
    document.getElementById('contactsView').style.display = 'block';
  }

  // ================================================
  // HELPERS
  // ================================================
  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escapeAttr(str) {
    if (!str) return '';
    return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  // ================================================
  // INIT
  // ================================================
  (async () => {
    const isAuthed = await initAdmin('whatsapp');
    if (isAuthed) loadContacts();
  })();
</script>
</body>
</html>
